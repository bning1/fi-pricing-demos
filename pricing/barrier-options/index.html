<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrier Options Pricer (Reiner-Rubinstein)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ Barrier Options Pricer (Reiner-Rubinstein)</h1>
        <p>Price all 8 vanilla barrier options using closed-form formulas. Toggle type, view all 8 prices, sensitivity charts.</p>
        
        <form id="barrierForm" novalidate>
            <div class="inputs-grid">
                <div class="input-group">
                    <label for="S0">Spot Price S₀ ($):</label>
                    <input type="number" id="S0" value="100" step="any">
                </div>
                <div class="input-group">
                    <label for="H">Barrier H ($):</label>
                    <input type="number" id="H" value="110" step="any">
                </div>
                <div class="input-group">
                    <label for="K">Strike K ($):</label>
                    <input type="number" id="K" value="100" step="any">
                </div>
                <div class="input-group">
                    <label for="r">Risk-Free Rate r (%):</label>
                    <input type="number" id="r" value="5" step="any">
                </div>
                <div class="input-group">
                    <label for="sigma">Volatility σ (%):</label>
                    <input type="number" id="sigma" value="20" step="any">
                </div>
                <div class="input-group">
                    <label for="T">Time to Maturity T (years):</label>
                    <input type="number" id="T" value="1" step="any">
                </div>
            </div>
            <div id="barrier-errors" style="color:#e53e3e; margin-bottom:1rem; display:none;"></div>
            <button type="submit">Price All 8 Barriers</button>
        </form>

        <div id="results" style="display:none;">
            <h2>Results</h2>
            <table id="barrierTable">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Direction</th>
                        <th>In/Out</th>
                        <th>Call/Put</th>
                        <th>Price ($)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            
            <h2>Payoff Sensitivity (Strike vs Price)</h2>
            <canvas id="sensitivityChart"></canvas>
            
            <a href="../../index.html" class="back-link">← Back to Hub</a>
        </div>
    </div>
    <script src="barrier.js"></script>
    <script>
        var types = [
            { name: 'UIC', label: 'Up & In Call' },
            { name: 'UIP', label: 'Up & In Put' },
            { name: 'UOC', label: 'Up & Out Call' },
            { name: 'UOP', label: 'Up & Out Put' },
            { name: 'DIC', label: 'Down & In Call' },
            { name: 'DIP', label: 'Down & In Put' },
            { name: 'DOC', label: 'Down & Out Call' },
            { name: 'DOP', label: 'Down & Out Put' }
        ];

        function safeParse(id, fallback) {
            var v = parseFloat(document.getElementById(id).value);
            return Number.isFinite(v) ? v : fallback;
        }

        function showErrors(errs) {
            var el = document.getElementById('barrier-errors');
            if (errs && errs.length) {
                el.innerHTML = errs.join('<br>');
                el.style.display = 'block';
            } else {
                el.innerHTML = '';
                el.style.display = 'none';
            }
        }

        document.getElementById('barrierForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Read actual field values; fall back to defaults if empty/NaN
            var S0    = safeParse('S0', 100);
            var H     = safeParse('H', 110);
            var K     = safeParse('K', 100);
            var r     = safeParse('r', 5) / 100;
            var sigma = safeParse('sigma', 20) / 100;
            var T     = safeParse('T', 1);

            // Validate actual parsed values
            var errors = [];
            if (!(S0 > 0))            errors.push('Spot S₀ must be positive (got ' + S0 + ')');
            if (!(H > 0))             errors.push('Barrier H must be positive (got ' + H + ')');
            if (!(K > 0))             errors.push('Strike K must be positive (got ' + K + ')');
            if (!Number.isFinite(r))  errors.push('Rate r must be a finite number');
            if (!(sigma > 0))         errors.push('Volatility σ must be positive (got ' + (sigma * 100) + '%)');
            if (!(T > 0))             errors.push('Maturity T must be positive (got ' + T + ')');

            if (errors.length) {
                showErrors(errors);
                document.getElementById('results').style.display = 'none';
                return;
            }
            showErrors([]);

            // Price all 8 types
            var results = [];
            types.forEach(function (t) {
                var pricer = window.BarrierPricers[t.name];
                var price = pricer(S0, H, K, r, sigma, T);
                results.push({
                    name: t.name,
                    label: t.label,
                    price: price,
                    direction: t.name.charAt(0) === 'U' ? 'Up' : 'Down',
                    inout: t.name.charAt(1) === 'I' ? 'In' : 'Out',
                    callput: t.name.charAt(2) === 'C' ? 'Call' : 'Put'
                });
            });

            // Update table
            var tbody = document.querySelector('#barrierTable tbody');
            tbody.innerHTML = results.map(function (r) {
                return '<tr>' +
                    '<td><strong>' + r.name + '</strong></td>' +
                    '<td>' + r.direction + '</td>' +
                    '<td>' + r.inout + '</td>' +
                    '<td>' + r.callput + '</td>' +
                    '<td class="positive">$' + r.price.toFixed(4) + '</td>' +
                '</tr>';
            }).join('');

            // Sensitivity chart: Price vs Strike
            var strikes = [];
            for (var i = 0; i < 20; i++) strikes.push(K * (0.5 + i * 0.1));

            var priceSets = {};
            types.forEach(function (t) {
                priceSets[t.name] = strikes.map(function (k) {
                    return window.BarrierPricers[t.name](S0, H, k, r, sigma, T);
                });
            });

            var ctx = document.getElementById('sensitivityChart').getContext('2d');
            if (window.chart) window.chart.destroy();
            window.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: strikes.map(function (k) { return k.toFixed(1); }),
                    datasets: types.map(function (t, i) {
                        return {
                            label: t.name,
                            data: priceSets[t.name],
                            borderColor: 'hsl(' + (i * 45) + ', 70%, 50%)',
                            tension: 0.3
                        };
                    })
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            document.getElementById('results').style.display = 'block';
        });
    </script>
</body>
</html>
