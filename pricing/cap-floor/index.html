<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cap/Floor Pricer (Black '76)</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Cap/Floor Pricer (Black '76 Multi-Caplet)</h1>
  <p>Price a cap or floor (series of caplets/floorlets) using the Black '76 model. Results in basis points.</p>

  <form id="capfloorForm" novalidate>
    <div class="inputs-grid">
      <div class="input-group">
        <label for="notional">Notional ($mm):</label>
        <input type="number" id="notional" value="100" step="any">
      </div>
      <div class="input-group">
        <label for="startDate">Start Date:</label>
        <input type="date" id="startDate" value="2026-03-01">
      </div>
      <div class="input-group">
        <label for="endDate">End Date:</label>
        <input type="date" id="endDate" value="2027-03-01">
      </div>
      <div class="input-group">
        <label for="lag">Fixing Lag (days):</label>
        <input type="number" id="lag" value="2" step="any">
      </div>
      <div class="input-group">
        <label for="freq">Payment Freq (months):</label>
        <input type="number" id="freq" value="6" step="any">
      </div>
      <div class="input-group">
        <label for="dayCount">Day Count:</label>
        <select id="dayCount">
          <option value="ACT/360">ACT/360</option>
          <option value="30/360">30/360</option>
        </select>
      </div>
      <div class="input-group">
        <label for="strike">Strike (%):</label>
        <input type="number" id="strike" value="5.0" step="any">
      </div>
      <div class="input-group">
        <label for="vol">Volatility (%):</label>
        <input type="number" id="vol" value="20.0" step="any">
      </div>
      <div class="input-group">
        <label for="libor">Libor/Forward Rate (%):</label>
        <input type="number" id="libor" value="4.5" step="any">
      </div>
      <div class="input-group">
        <label for="type">Type:</label>
        <select id="type">
          <option value="cap">Cap</option>
          <option value="floor">Floor</option>
        </select>
      </div>
    </div>
    <button type="submit">Price</button>
  </form>

  <div id="results" style="display:none;">
    <h2>Caplet/Floorlet Breakdown</h2>
    <table id="capletTable">
      <thead>
        <tr>
          <th>Period</th>
          <th>Start</th>
          <th>End</th>
          <th>DF</th>
          <th>Forward (%)</th>
          <th>NPV ($)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p id="totalPrice"></p>

    <h2>Strike Sensitivity</h2>
    <canvas id="chart"></canvas>
  </div>

  <p style="margin-top:2rem;"><a href="../../index.html">← Back to Hub</a></p>
  <script src="script.js"></script>
</body>
</html>
